<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Orderly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h2>📝 Daftar Akun</h2>
            <p class="form-text">Bergabunglah dengan komunitas Orderly</p>

            <div id="alerts"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Pilih Peran Anda</label>
                    <div class="role-selector">
                        <div class="role-option">
                            <input type="radio" name="role" id="role-buyer" value="buyer" checked>
                            <label for="role-buyer">
                                <span class="role-icon">👤</span>
                                <strong>Pembeli</strong>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-seller" value="seller">
                            <label for="role-seller">
                                <span class="role-icon">🏪</span>
                                <strong>Penjual</strong>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="name" 
                        placeholder="John Doe"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        placeholder="nama@email.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="Minimal 8 karakter"
                        required
                        minlength="8">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="confirmPassword" 
                        placeholder="Ulangi password"
                        required
                        minlength="8">
                </div>

                <button type="submit" class="btn btn-submit" id="submitBtn">
                    <span id="btnText">Daftar Sekarang</span>
                </button>
            </form>

            <div class="auth-link">
                Sudah punya akun? 
                <a href="login.html">Masuk di sini</a>
            </div>

            <!-- Info -->
            <div class="alert alert-info mt-4" style="font-size: 0.9rem;">
                <strong>💡 Tip:</strong><br>
                <small>Pilih peran yang sesuai. Pembeli bisa membeli, Penjual bisa membuat katalog produk.</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            // Validasi password match
            if (password !== confirmPassword) {
                showAlert('danger', '❌ Password tidak cocok!');
                return;
            }

            // Validasi password length
            if (password.length < 8) {
                showAlert('danger', '❌ Password minimal 8 karakter!');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Loading...';

            try {
                await register(name, email, password, role);
            } catch (error) {
                // Error already shown by register function
            } finally {
                submitBtn.disabled = false;
                btnText.innerHTML = 'Daftar Sekarang';
            }
        });

        // Role selector styling
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                option.querySelector('input[type="radio"]').checked = true;
            });
        });
    </script>
</body>
</html>
