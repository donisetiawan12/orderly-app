<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Orderly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h2>🔐 Login</h2>
            <p class="form-text">Masuk ke akun Orderly Anda</p>

            <div id="alerts"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        placeholder="nama@email.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn btn-submit" id="submitBtn">
                    <span id="btnText">Masuk</span>
                </button>
            </form>

            <div class="auth-link">
                Belum punya akun? 
                <a href="register.html">Daftar di sini</a>
            </div>

            <!-- Demo Credentials -->
            <div class="alert alert-info mt-4" style="font-size: 0.9rem;">
                <strong>Demo Akun:</strong><br>
                <small>👤 Buyer: john@example.com / password123</small><br>
                <small>🏪 Seller: seller@example.com / password123</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Disable button and show loading
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Loading...';

            try {
                await login(email, password);
            } catch (error) {
                // Error already shown by login function
            } finally {
                submitBtn.disabled = false;
                btnText.innerHTML = 'Masuk';
            }
        });
    </script>
</body>
</html>
